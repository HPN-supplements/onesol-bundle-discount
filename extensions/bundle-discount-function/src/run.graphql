query Input {
  cart {
    lines {
      id
      quantity
      cost {
        subtotalAmount {
          amount
        }
      }
      bundleItem: attribute(key: "_bundle_item") {
        value
      }
      bundleId: attribute(key: "_bundle_id") {
        value
      }
    }
  }
  discount {
    discountClasses
  }
}
